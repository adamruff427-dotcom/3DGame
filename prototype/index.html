<!doctype html>
<meta charset="utf-8">
<title>3DGame — Vertical Loop</title>
<style>
  html,body{margin:0;height:100%;background:#090b10;color:#d9e0dc;font:14px monospace;overflow:hidden}body{display:grid;place-items:center}canvas{width:min(100vw,1400px);height:min(100vh,788px);image-rendering:pixelated;background:#121820;box-shadow:0 0 0 1px #28343b,0 20px 80px #000}
  #hint{position:fixed;left:18px;bottom:14px;color:#71817c;letter-spacing:.08em}#title{position:fixed;left:18px;top:14px;color:#d5a85a;letter-spacing:.18em}
</style>
<div id="title">3DGAME // VERTICAL LOOP</div><div id="hint">WASD MOVE · MOUSE AIM · CLICK FIRE · E LIFT</div><canvas id="c" width="320" height="180"></canvas>
<script>
const c=document.querySelector('canvas'),x=c.getContext('2d'),W=320,H=180,TAU=Math.PI*2;
const level=[
  '################', '#......#.......#', '#......#.......#', '#...............#', '#..####...####..#', '#..#........#...#', '#..#...A....#...#', '#..#........#...#', '#..####...####..#', '#.......L.......#', '#..####...####..#', '#..#........#...#', '#..#....B...#...#', '#..#........#...#', '#..####...####..#', '#...............#', '#.......S.......#', '################'];
const cell=1, solids=(q)=>q==='#', key=(a,b)=>`${a|0},${b|0}`;
let p={x:2.5,y:3.5,a:0,z:0},keys={},shots=[],enemies=[{x:12.5,y:3.2,z:0,h:3},{x:3.5,y:12.5,z:1,h:3},{x:11.5,y:6.5,z:0,h:3}],lift=false,flash=0,last=performance.now();
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;if(e.key.toLowerCase()==='e'&&Math.hypot(p.x-7.5,p.y-9.5)<1.5){p.z=p.z?0:1;lift=true}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);
c.onclick=()=>{c.requestPointerLock();shoot()};addEventListener('mousedown',e=>{if(e.target===c)shoot()});addEventListener('mousemove',e=>{if(document.pointerLockElement===c)p.a+=e.movementX*.003});
function wall(a,b){return solids(level[Math.max(0,Math.min(17,b|0))]?.[Math.max(0,Math.min(15,a|0))]||'#')}
function shoot(){flash=.08;for(const e of enemies){let dx=e.x-p.x,dy=e.y-p.y,d=Math.hypot(dx,dy),da=Math.atan2(Math.sin(Math.atan2(dy,dx)-p.a),Math.cos(Math.atan2(dy,dx)));if(Math.abs(da)<.12&&d<8&&e.z===p.z){e.h--;shots.push({x:e.x,y:e.y,t:.16});break}}}
function move(dt){let sp=keys.shift?3.7:2.2,dx=0,dy=0;if(keys.w)dx+=Math.cos(p.a),dy+=Math.sin(p.a);if(keys.s)dx-=Math.cos(p.a),dy-=Math.sin(p.a);if(keys.a)dx+=Math.cos(p.a-Math.PI/2),dy+=Math.sin(p.a-Math.PI/2);if(keys.d)dx+=Math.cos(p.a+Math.PI/2),dy+=Math.sin(p.a+Math.PI/2);let n=Math.hypot(dx,dy)||1,nx=p.x+dx/n*sp*dt,ny=p.y+dy/n*sp*dt;if(!wall(nx,p.y))p.x=nx;if(!wall(p.x,ny))p.y=ny}
function ray(a){let d=0,st=.035;while(d<16){let xx=p.x+Math.cos(a)*d,yy=p.y+Math.sin(a)*d;if(wall(xx,yy))return d;d+=st}return 16}
function draw(){x.fillStyle='#121a22';x.fillRect(0,0,W,H);let horizon=82-(p.z?8:0);x.fillStyle='#1b2630';x.fillRect(0,0,W,horizon);x.fillStyle='#0c1014';x.fillRect(0,horizon,W,H-horizon);for(let i=0;i<W;i++){let a=p.a+(i/W-.5)*1.15,d=ray(a)*Math.cos(a-p.a),h=Math.min(H*1.5,88/d),col=Math.max(20,120-d*7)|0;x.fillStyle=`rgb(${col},${col+9},${col+10})`;x.fillRect(i,horizon-h/2,1,h);}
  const visible=enemies.filter(e=>e.z===p.z).map(e=>{let dx=e.x-p.x,dy=e.y-p.y,d=Math.hypot(dx,dy),a=Math.atan2(dy,dx)-p.a; a=Math.atan2(Math.sin(a),Math.cos(a));return {e,d,a}}).filter(q=>Math.abs(q.a)<.65&&q.d<12).sort((a,b)=>b.d-a.d);for(const q of visible){let sx=W/2+q.a/.575*W/2,size=Math.min(70,44/q.d),sy=horizon+size*.15; x.fillStyle=q.e.h===1?'#e4bf65':'#a9433f';x.fillRect(sx-size/2,sy-size,size,size);x.fillStyle='#221b1d';x.fillRect(sx-size*.3,sy-size*.62,size*.18,size*.18);x.fillRect(sx+size*.12,sy-size*.62,size*.18,size*.18)}
  x.strokeStyle='#d7d5bc';x.beginPath();x.moveTo(W/2-5,H/2);x.lineTo(W/2+5,H/2);x.moveTo(W/2,H/2-5);x.lineTo(W/2,H/2+5);x.stroke();x.fillStyle='#d8d1ba';x.fillText(`LEVEL ${p.z+1}  //  CORE ${enemies.filter(e=>e.h>0).length}`,8,16);x.fillStyle='#d5a85a';x.fillText(lift?'LIFT ENGAGED':'FIND THE LIFT',8,H-10);if(flash){x.fillStyle='#fff4ca';x.fillRect(0,0,W,H);flash=0}}
function loop(t){let dt=Math.min(.05,(t-last)/1000);last=t;move(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
